<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="100%" height="100%">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#451A03" />
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
  </defs>
  <rect width="600" height="360" rx="20" fill="url(#bg5)" />
  <circle cx="200" cy="180" r="140" fill="#F59E0B" opacity="0.25" filter="blur(30px)" />
  
  <rect x="60" y="50" width="480" height="260" rx="16" fill="#0F172A" stroke="#78350F" stroke-width="2" />
  <rect x="60" y="50" width="480" height="42" rx="16" fill="#1E293B" />
  <circle cx="85" cy="71" r="6" fill="#EF4444" />
  <circle cx="105" cy="71" r="6" fill="#FBBF24" />
  <circle cx="125" cy="71" r="6" fill="#10B981" />
  <text x="300" y="76" font-family="sans-serif" font-size="13" font-weight="600" fill="#FEF3C7" text-anchor="middle">Chenosa Tech — MSSQL Database Maintenance &amp; Query Ops</text>

  <!-- Database Stack Mockup -->
  <rect x="85" y="110" width="180" height="180" rx="12" fill="#1E293B" />
  <!-- Database Cylinder 1 -->
  <ellipse cx="175" cy="145" rx="50" ry="18" fill="url(#card5)" />
  <path d="M 125 145 L 125 170 Q 175 188, 225 170 L 225 145 Z" fill="url(#card5)" opacity="0.8" />
  <!-- Database Cylinder 2 -->
  <ellipse cx="175" cy="190" rx="50" ry="18" fill="url(#card5)" />
  <path d="M 125 190 L 125 215 Q 175 233, 225 215 L 225 190 Z" fill="url(#card5)" opacity="0.8" />
  <!-- Database Cylinder 3 -->
  <ellipse cx="175" cy="235" rx="50" ry="18" fill="url(#card5)" />
  <path d="M 125 235 L 125 260 Q 175 278, 225 260 L 225 235 Z" fill="url(#card5)" opacity="0.8" />

  <!-- SQL Query Editor -->
  <rect x="285" y="110" width="230" height="180" rx="12" fill="#0F172A" stroke="#334155" stroke-width="1.5" />
  <text x="305" y="135" font-family="monospace" font-size="12" font-weight="700" fill="#38BDF8">SELECT</text>
  <text x="365" y="135" font-family="monospace" font-size="12" fill="#F1F5F9"> * </text>
  <text x="385" y="135" font-family="monospace" font-size="12" font-weight="700" fill="#38BDF8">FROM</text>
  <text x="305" y="155" font-family="monospace" font-size="12" fill="#34D399">  production_logs</text>
  <text x="305" y="175" font-family="monospace" font-size="12" font-weight="700" fill="#38BDF8">WHERE</text>
  <text x="355" y="175" font-family="monospace" font-size="12" fill="#F1F5F9"> latency &lt; 10</text>
  <text x="305" y="195" font-family="monospace" font-size="12" font-weight="700" fill="#F59E0B">ORDER BY</text>
  <text x="375" y="195" font-family="monospace" font-size="12" fill="#F1F5F9"> timestamp DESC;</text>

  <rect x="305" y="235" width="190" height="36" rx="8" fill="#1E293B" />
  <circle cx="325" cy="253" r="6" fill="#10B981" />
  <text x="340" y="257" font-family="sans-serif" font-size="11" font-weight="700" fill="#10B981">Query Executed in 4ms (0 Errors)</text>
</svg>
