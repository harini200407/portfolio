<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="100%" height="100%">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A0E2B" />
      <stop offset="100%" stop-color="#4E1234" />
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB7185" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>
  <rect width="600" height="360" rx="20" fill="url(#bg2)" />
  <circle cx="100" cy="80" r="130" fill="#FB7185" opacity="0.25" filter="blur(30px)" />
  <circle cx="500" cy="280" r="140" fill="#F59E0B" opacity="0.2" filter="blur(30px)" />
  
  <!-- Main Payroll App Window -->
  <rect x="60" y="50" width="480" height="260" rx="16" fill="#18181B" stroke="#3F3F46" stroke-width="2" />
  <rect x="60" y="50" width="480" height="42" rx="16" fill="#27272A" />
  <circle cx="85" cy="71" r="6" fill="#FB7185" />
  <circle cx="105" cy="71" r="6" fill="#FBBF24" />
  <circle cx="125" cy="71" r="6" fill="#34D399" />
  <text x="300" y="76" font-family="sans-serif" font-size="13" font-weight="600" fill="#A1A1AA" text-anchor="middle">Payroll &amp; Salary Automated Management Suite</text>

  <!-- Left Stats Card -->
  <rect x="85" y="110" width="200" height="90" rx="12" fill="#27272A" />
  <text x="105" y="135" font-family="sans-serif" font-size="12" fill="#A1A1AA">Total Disbursed (Month)</text>
  <text x="105" y="165" font-family="sans-serif" font-size="24" font-weight="800" fill="#34D399">₹ 48,50,000</text>
  <rect x="105" y="178" width="80" height="12" rx="6" fill="rgba(52, 211, 153, 0.2)" />
  <text x="145" y="187" font-family="sans-serif" font-size="9" font-weight="700" fill="#34D399" text-anchor="middle">+12.4% vs last</text>

  <!-- Right Automated Workflow Card -->
  <rect x="305" y="110" width="210" height="180" rx="12" fill="url(#card2)" />
  <circle cx="410" cy="160" r="32" fill="#FFFFFF" opacity="0.2" />
  <!-- Dollar/Rupee icon -->
  <text x="410" y="171" font-family="sans-serif" font-size="30" font-weight="900" fill="#FFFFFF" text-anchor="middle">₹</text>
  <text x="410" y="215" font-family="sans-serif" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">Automated Processing</text>
  <text x="410" y="235" font-family="sans-serif" font-size="11" fill="#FFFBEB" text-anchor="middle">1-Click Salary Calculation</text>
  <rect x="345" y="250" width="130" height="26" rx="13" fill="#FFFFFF" />
  <text x="410" y="267" font-family="sans-serif" font-size="11" font-weight="800" fill="#E11D48" text-anchor="middle">Run Payroll Now</text>

  <!-- Employee Table Preview -->
  <rect x="85" y="215" width="200" height="75" rx="12" fill="#27272A" />
  <circle cx="110" cy="240" r="12" fill="#FB7185" />
  <text x="132" y="244" font-family="sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Arun Kumar</text>
  <text x="240" y="244" font-family="sans-serif" font-size="11" font-weight="700" fill="#34D399">Paid ✓</text>
  
  <circle cx="110" cy="268" r="12" fill="#F59E0B" />
  <text x="132" y="272" font-family="sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Divya Ramesh</text>
  <text x="240" y="272" font-family="sans-serif" font-size="11" font-weight="700" fill="#34D399">Paid ✓</text>
</svg>
